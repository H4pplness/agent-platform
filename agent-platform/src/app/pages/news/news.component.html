<!-- ===================== NEWS HERO ===================== -->
<section class="pt-32 pb-16 bg-gradient-to-b from-slate-50 to-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <span class="inline-block text-sm font-semibold text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full mb-4">
      {{ i18n.t().pages.news.badge }}
    </span>
    <h1 class="text-4xl sm:text-5xl font-extrabold text-slate-900 mb-6 tracking-tight">
      {{ i18n.t().pages.news.title }}
    </h1>
    <p class="text-xl text-slate-500 max-w-2xl mx-auto leading-relaxed">
      {{ i18n.t().pages.news.subtitle }}
    </p>
  </div>
</section>

<!-- ===================== NEWS GRID ===================== -->
<section class="py-16 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (post of placeholderPosts; track $index) {
        <article class="group rounded-2xl border border-slate-200 overflow-hidden hover:shadow-lg hover:border-blue-100 transition-all duration-300 bg-white cursor-pointer">
          <!-- Thumbnail placeholder -->
          <div class="h-48 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center">
            <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
          </div>

          <div class="p-6">
            <div class="flex items-center gap-3 mb-3">
              <span class="text-xs font-semibold px-2.5 py-1 rounded-full {{ post.color }}">{{ post.tag }}</span>
              <span class="text-xs text-slate-400">{{ post.date }}</span>
            </div>
            <!-- Title placeholder -->
            <div class="space-y-2 mb-4">
              <div class="h-4 bg-slate-200 rounded w-full"></div>
              <div class="h-4 bg-slate-200 rounded w-3/4"></div>
            </div>
            <!-- Excerpt placeholder -->
            <div class="space-y-1.5">
              <div class="h-3 bg-slate-100 rounded w-full"></div>
              <div class="h-3 bg-slate-100 rounded w-5/6"></div>
              <div class="h-3 bg-slate-100 rounded w-4/6"></div>
            </div>
            <div class="mt-5 flex items-center text-blue-600 text-sm font-medium opacity-60">
              <span>Read more</span>
              <svg class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </div>
        </article>
      }
    </div>

    <!-- Coming soon notice -->
    <div class="mt-16 text-center py-12 rounded-2xl bg-slate-50 border border-slate-200">
      <span class="text-4xl mb-4 block">📰</span>
      <h3 class="text-xl font-bold text-slate-900 mb-2">{{ i18n.t().pages.news.comingSoon }}</h3>
      <p class="text-slate-500 text-sm">Real articles will appear here once published.</p>
    </div>
  </div>
</section>

<app-footer />
